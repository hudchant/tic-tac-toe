<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Tic-Tac-Toe</title>
</head>

<body>
    <h1>Tic-Tac-Toe</h1>
    <!-- Boxes main container -->
    <div class="containerOne">
        <!-- Divs to hold X's and O's -->
        <div>
            <div class="boxes" id="box1"></div>
            <div class="boxes" id="box2"></div>
            <div class="boxes" id="box3"></div>
        </div>
        <div>
            <div class="boxes" id="box4"></div>
            <div class="boxes" id="box5"></div>
            <div class="boxes" id="box6"></div>
        </div>
        <div>
            <div class="boxes" id="box7"></div>
            <div class="boxes" id="box8"></div>
            <div class="boxes" id="box9"></div>
        </div>
    </div>
    <!-- Buttons and game results container -->
    <div class="containerTwo">
        <div class="buttons">
            <!-- Click to start game -->
            <button class="start">START GAME</button> 
            <!-- Click to restart game -->
            <button class='restart'>RESTART GAME</button> 
        </div>
        <!-- Message to be displayed when a player wins the game or when there is no winner due to a draw -->
        <div class="results"></div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
